# xcodegen spec for the Apple TV companion app.
# Regenerate with: cd apple_tv && xcodegen generate
#
# Separate App Store Connect record from the iOS app (no Universal Purchase).
# Apple bundle IDs forbid underscores; reverse-DNS uses the .ro country prefix.

name: RadioCrestinTV
options:
  bundleIdPrefix: ro.radiocrestin
  deploymentTarget:
    tvOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    DEVELOPMENT_TEAM: "2KNY2RZVGC"   # Same Apple Developer team as the iOS app
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "3"      # tvOS = 3
    SUPPORTS_MACCATALYST: NO
    ENABLE_BITCODE: NO
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO

packages:
  PostHog:
    url: https://github.com/PostHog/posthog-ios
    from: "3.0.0"

targets:
  RadioCrestinTV:
    type: application
    platform: tvOS
    deploymentTarget: "17.0"
    sources:
      - path: RadioCrestinTV/Sources
      - path: RadioCrestinTV/Resources
    dependencies:
      - package: PostHog
        product: PostHog
    info:
      path: RadioCrestinTV/Info.plist
      properties:
        CFBundleDisplayName: Radio Crestin
        CFBundleShortVersionString: "1.5.0"
        CFBundleVersion: "83"
        UILaunchScreen: {}
        NSAppTransportSecurity:
          # iOS app already ships with NSAllowsArbitraryLoads=true; tvOS
          # needs the same so http:// Icecast streams play without TLS.
          NSAllowsArbitraryLoads: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ro.radiocrestin.radiocrestintv
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # tvOS Top Shelf placeholder; we'll fill the asset catalog later.
        TVTopShelfImagePath: ""
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.music
      configs:
        # No physical Apple TV is registered on the team, so Apple can't
        # issue a Development profile. Both configs use Manual signing:
        # Debug uses ad-hoc identity ("-") so the simulator build runs
        # locally without requesting any profile. Release uses the App
        # Store Distribution cert + a manually-created App Store profile
        # (the profile is created at developer.apple.com — App Store
        # profiles do NOT need registered devices).
        #
        # Why not Automatic for Release? xcodebuild's pre-archive
        # provisioning sweep tries to fetch BOTH a Development AND a
        # Distribution profile from Apple, and the Development fetch
        # fails (no registered tvOS devices), blocking archive.
        Debug:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "-"
          PROVISIONING_PROFILE_SPECIFIER: ""
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "Radio Crestin TV App Store"

schemes:
  RadioCrestinTV:
    build:
      targets:
        RadioCrestinTV: all
    # Force every scheme action (Run, Test, Profile, Analyze, Archive) onto
    # Release config so xcodebuild only ever provisions the App Store profile.
    # Without this, xcodebuild's pre-build provisioning sweep also fetches
    # the Debug/Development profile — which Apple refuses to issue because
    # the team has no registered tvOS devices, blocking archive.
    run:
      config: Release
    test:
      config: Release
    profile:
      config: Release
    analyze:
      config: Release
    archive:
      config: Release
