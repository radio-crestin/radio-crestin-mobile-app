# xcodegen spec for the Apple TV companion app.
# Regenerate with: cd apple_tv && xcodegen generate
#
# Separate App Store Connect record from the iOS app (no Universal Purchase).
# Apple bundle IDs forbid underscores; reverse-DNS uses the .ro country prefix.

name: RadioCrestinTV
options:
  bundleIdPrefix: ro.radiocrestin
  deploymentTarget:
    tvOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    DEVELOPMENT_TEAM: "2KNY2RZVGC"   # Same Apple Developer team as the iOS app
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "3"      # tvOS = 3
    SUPPORTS_MACCATALYST: NO
    ENABLE_BITCODE: NO
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO

packages:
  PostHog:
    url: https://github.com/PostHog/posthog-ios
    from: "3.0.0"

targets:
  RadioCrestinTV:
    type: application
    platform: tvOS
    deploymentTarget: "17.0"
    sources:
      - path: RadioCrestinTV/Sources
      - path: RadioCrestinTV/Resources
    dependencies:
      - package: PostHog
        product: PostHog
    info:
      path: RadioCrestinTV/Info.plist
      properties:
        CFBundleDisplayName: Radio Crestin
        CFBundleShortVersionString: "1.5.0"
        CFBundleVersion: "83"
        UILaunchScreen: {}
        NSAppTransportSecurity:
          # iOS app already ships with NSAllowsArbitraryLoads=true; tvOS
          # needs the same so http:// Icecast streams play without TLS.
          NSAllowsArbitraryLoads: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ro.radiocrestin.radiocrestintv
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # tvOS Top Shelf placeholder; we'll fill the asset catalog later.
        TVTopShelfImagePath: ""
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.music
      configs:
        # No physical Apple TV is registered on the team, so Apple can't
        # issue a Development profile. Manual signing for Debug + ad-hoc
        # identity ("-") lets the simulator build run locally without
        # requesting any profile. Release stays on automatic so Xcode
        # fetches the App Store Distribution profile (which doesn't need
        # devices) at archive time.
        Debug:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "-"
          PROVISIONING_PROFILE_SPECIFIER: ""
        Release:
          CODE_SIGN_STYLE: Automatic

  RadioCrestinTVTests:
    type: bundle.unit-test
    platform: tvOS
    deploymentTarget: "17.0"
    sources:
      - path: RadioCrestinTVTests
    dependencies:
      - target: RadioCrestinTV
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ro.radiocrestin.radiocrestintv.tests
        GENERATE_INFOPLIST_FILE: YES
      configs:
        Debug:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "-"
          PROVISIONING_PROFILE_SPECIFIER: ""
        Release:
          CODE_SIGN_STYLE: Automatic

schemes:
  RadioCrestinTV:
    build:
      targets:
        RadioCrestinTV: all
        RadioCrestinTVTests: [test]
    test:
      targets:
        - RadioCrestinTVTests
      gatherCoverageData: true
